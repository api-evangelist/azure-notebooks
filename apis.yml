aid: azure-notebooks
name: Azure Notebooks
description: >-
  Azure Notebooks was a free hosted service to develop and run Jupyter notebooks
  in the cloud with no installation required. The service was retired on October 9, 2020.
  Users are recommended to migrate to Azure Machine Learning, Visual Studio Code with
  Jupyter extension, or GitHub Codespaces for equivalent functionality.
